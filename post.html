<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title id="postPageTitle">Blog Post — ArtiMindArt</title>
    <meta name="description" id="postPageDesc" content="">
    <meta property="og:type" content="article">
    <meta property="og:title" id="postOgTitle" content="">
    <meta property="og:description" id="postOgDesc" content="">
    <meta property="og:site_name" content="ArtiMindArt">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@artimindArt">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .post-hero{padding:140px 0 40px}
        .post-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
            font-family:var(--display);color:var(--t2);margin-bottom:32px;transition:color .2s}
        .post-back:hover{color:var(--lime)}
        .post-cat{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:600;
            font-family:var(--display);background:var(--lime-10);color:var(--lime);letter-spacing:.5px;
            text-transform:uppercase;margin-bottom:20px}
        .post-title{font-family:var(--display);font-size:clamp(2rem,4.5vw,3rem);font-weight:700;
            line-height:1.15;letter-spacing:-.03em;margin-bottom:16px;max-width:800px}
        .post-meta{display:flex;align-items:center;gap:16px;color:var(--t3);font-size:13px;
            font-family:var(--display);margin-bottom:40px}
        .post-meta time{text-transform:uppercase;letter-spacing:1px}

        .post-image{width:100%;max-height:480px;object-fit:cover;border-radius:var(--r-card);
            border:1px solid var(--b1);margin-bottom:48px}

        .post-content{max-width:740px;margin:0 auto 80px;font-size:1.05rem;line-height:1.8;color:var(--t2)}
        .post-content p{margin-bottom:1.4em}
        .post-content h2{font-family:var(--display);font-size:1.6rem;font-weight:700;color:var(--t1);margin:2em 0 .8em;letter-spacing:-.02em}
        .post-content h3{font-family:var(--display);font-size:1.25rem;font-weight:700;color:var(--t1);margin:1.6em 0 .6em}
        .post-content strong{color:var(--t1)}
        .post-content a{color:var(--lime);text-decoration:underline}
        .post-content ul,.post-content ol{margin:0 0 1.4em 1.4em}
        .post-content li{margin-bottom:.4em}
        .post-content blockquote{border-left:3px solid var(--lime);padding-left:20px;margin:1.6em 0;font-style:italic;color:var(--t1)}
        .post-content img{max-width:100%;border-radius:var(--r);margin:1.4em 0}
        .post-content code{font-family:'JetBrains Mono',monospace;font-size:.9em;background:var(--surface);padding:2px 6px;border-radius:4px}
        .post-content pre{background:var(--surface);border:1px solid var(--b1);border-radius:var(--r);padding:20px;overflow-x:auto;margin:1.4em 0}
        .post-content pre code{background:none;padding:0}

        /* Related posts */
        .related{padding:80px 0;border-top:1px solid var(--b1)}
        .related h2{font-family:var(--display);font-size:1.6rem;font-weight:700;margin-bottom:32px;letter-spacing:-.02em}
        .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
        .related .blog-card{background:var(--surface);border:1px solid var(--b1);border-radius:var(--r-card);overflow:hidden;transition:all .3s var(--ease)}
        .related .blog-card:hover{border-color:var(--b2);transform:translateY(-4px)}
        .related .bc-image{height:180px;display:flex;align-items:flex-start;padding:14px}
        .related .bc-cat{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;
            font-family:var(--display);background:rgba(0,0,0,.6);backdrop-filter:blur(8px);color:var(--lime);letter-spacing:.5px;text-transform:uppercase}
        .related .bc-body{padding:20px}
        .related .bc-body time{font-size:11px;color:var(--t3);font-family:var(--display);text-transform:uppercase;letter-spacing:1px}
        .related .bc-body h3{font-family:var(--display);font-size:1rem;font-weight:700;line-height:1.3;margin:6px 0 8px}
        .related .bc-body p{font-size:13px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

        /* CTA */
        .post-cta{padding:80px 0;border-top:1px solid var(--b1)}
        .post-cta-inner{text-align:center;max-width:560px;margin:0 auto}
        .post-cta-inner h2{font-family:var(--display);font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;margin-bottom:12px;letter-spacing:-.02em}
        .post-cta-inner p{color:var(--t2);font-size:1rem;margin-bottom:28px;line-height:1.7}

        .post-404{text-align:center;padding:200px 0 100px}
        .post-404 h1{font-family:var(--display);font-size:2rem;margin-bottom:12px}
        .post-404 p{color:var(--t2);margin-bottom:24px}

        @media(max-width:640px){
            .related-grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <!-- Nav -->
    <nav class="navbar" id="navbar">
        <div class="nav-pill">
            <a href="index.html" class="nav-logo">
                <span class="logo-text">artimind<span class="logo-accent">.art</span></span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#work">Work</a></li>
                <li><a href="index.html#partners">Partners</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
            <div class="nav-right">
                <a href="index.html#contact" class="btn btn-primary btn-nav">Let's talk</a>
                <button class="nav-toggle" id="navToggle" aria-label="Menu">
                    <span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Post content (injected by JS) -->
    <div id="postContainer"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-top">
                <div class="footer-brand">
                    <a href="index.html" class="nav-logo"><span class="logo-text">artimind<span class="logo-accent">.art</span></span></a>
                    <p>AI Expert & Creative Technologist</p>
                </div>
                <nav class="footer-nav">
                    <a href="index.html#about">About</a>
                    <a href="index.html#services">Services</a>
                    <a href="index.html#work">Work</a>
                    <a href="index.html#partners">Partners</a>
                    <a href="blog.html">Blog</a>
                    <a href="index.html#contact">Contact</a>
                </nav>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 ArtiMindArt. All rights reserved. Made with AI & love from Spain.</p>
                <a href="admin.html" class="footer-admin-link">Admin</a>
            </div>
        </div>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Navbar scroll
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', scrollY > 60);
        }, { passive: true });

        // Mobile nav
        const toggle = document.getElementById('navToggle');
        const links = document.getElementById('navLinks');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            links.classList.toggle('active');
        });

        // Get slug from URL (hash-based for static server compatibility)
        const slug = window.location.hash.replace('#','') || new URLSearchParams(window.location.search).get('slug');
        const container = document.getElementById('postContainer');

        function show404() {
            container.innerHTML = `
                <div class="post-404">
                    <div class="container">
                        <h1>Post not found</h1>
                        <p>The post you're looking for doesn't exist or has been removed.</p>
                        <a href="blog.html" class="btn btn-primary">&larr; Back to blog</a>
                    </div>
                </div>`;
        }

        if (!slug) {
            show404();
            return;
        }

        // Load post
        const posts = JSON.parse(localStorage.getItem('artimind_blog_posts') || '[]');
        const post = posts.find(p => p.slug === slug);

        if (!post) {
            show404();
            return;
        }

        // Update page meta
        document.getElementById('postPageTitle').textContent = post.title + ' — ArtiMindArt';
        document.getElementById('postPageDesc').setAttribute('content', post.excerpt);
        document.getElementById('postOgTitle').setAttribute('content', post.title);
        document.getElementById('postOgDesc').setAttribute('content', post.excerpt);

        // Related posts (other 2 most recent published)
        const related = posts
            .filter(p => p.status === 'published' && p.id !== post.id)
            .sort((a,b) => new Date(b.date) - new Date(a.date))
            .slice(0, 2);

        const relatedHTML = related.length > 0 ? `
            <section class="related">
                <div class="container">
                    <h2>More from the blog</h2>
                    <div class="related-grid">
                        ${related.map(r => `
                            <a href="post.html#${r.slug}" class="blog-card" style="text-decoration:none;color:inherit">
                                <div class="bc-image" style="background:${r.image ? `url(${r.image}) center/cover` : 'linear-gradient(135deg,#1a1a2e,#16213e)'}">
                                    <span class="bc-cat">${r.category}</span>
                                </div>
                                <div class="bc-body">
                                    <time>${new Date(r.date).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})}</time>
                                    <h3>${r.title}</h3>
                                    <p>${r.excerpt}</p>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                </div>
            </section>` : '';

        // Render post
        container.innerHTML = `
            <header class="post-hero">
                <div class="container">
                    <a href="blog.html" class="post-back">&larr; Back to blog</a>
                    <div>
                        <span class="post-cat">${post.category}</span>
                        <h1 class="post-title">${post.title}</h1>
                        <div class="post-meta">
                            <time>${new Date(post.date).toLocaleDateString('en-US', {weekday:'long', month:'long',day:'numeric',year:'numeric'})}</time>
                        </div>
                    </div>
                </div>
            </header>
            ${post.image ? `<div class="container"><img class="post-image" src="${post.image}" alt="${post.title}"></div>` : ''}
            <div class="post-content">${post.content}</div>
            ${relatedHTML}
            <section class="post-cta">
                <div class="container">
                    <div class="post-cta-inner">
                        <h2>Need AI help? Let's talk.</h2>
                        <p>Whether you need strategy, visuals, automation or training — I'm here to help you leverage AI for real business results.</p>
                        <a href="index.html#contact" class="btn btn-primary">Start a project</a>
                    </div>
                </div>
            </section>
        `;
    });
    </script>
</body>
</html>
